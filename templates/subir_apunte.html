<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Apunte — ApuntesForge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>

<body>

    <nav class="navbar">
        <div class="nav-contenedor">
            <a href="/" class="logo" style="font-size: 0.85rem; color: var(--texto-gris);">← Volver al catálogo</a>
        </div>
    </nav>

    <main class="contenedor" style="margin: auto;">
        <div class="tarjeta-formulario">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="font-size: 1.4rem; font-weight: 800; margin: 0;">Compartir conocimiento</h2>
                <p style="font-size: 0.75rem; color: var(--texto-gris); margin-top: 0.25rem;">Tu documento se ordenará
                    automáticamente según las reacciones de la facultad.</p>
            </div>

            <form method="POST" action="/subir" enctype="multipart/form-data">
                <div class="form-grupo">
                    <label>Título del Apunte</label>
                    <input type="text" name="titulo" required maxlength="100"
                        placeholder="Ej: Apuntes Primer Corte Física II" class="form-input">
                </div>

                <div class="form-grupo">
                    <label>Materia o Asignatura</label>
                    <input type="text" name="materia" required maxlength="50" placeholder="Ej: Física II"
                        class="form-input">
                </div>

                <div class="form-grupo">
                    <label>Categoría General</label>
                    <select name="categoria" required class="form-input" style="cursor: pointer; height: 38px;">
                        <option value="" disabled selected>Selecciona una área...</option>
                        <option value="Ciencias Básicas">Ciencias Básicas</option>
                        <option value="Ingeniería">Ingeniería</option>
                        <option value="Humanidades">Humanidades</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label>Nombre del Autor</label>
                    <input type="text" name="autor" required maxlength="60" placeholder="Ej: Carlos Mendoza"
                        class="form-input">
                </div>

                <div class="form-grupo" style="margin-top: 1.5rem;">
                    <div class="dropzone">
                        <label style="margin-bottom: 0.5rem; display: block; cursor: pointer;">Seleccionar archivo
                            Universitario (.PDF)</label>
                        <input type="file" name="archivo" accept=".pdf" required
                            style="font-size: 0.75rem; color: var(--texto-gris); cursor: pointer;">
                    </div>
                </div>

                <button type="submit" class="btn-principal" style="width: 100%; padding: 0.85rem; margin-top: 1rem;">
                    🚀 Publicar Documento Gratis
                </button>
            </form>
        </div>
    </main>

</body>

</html>
